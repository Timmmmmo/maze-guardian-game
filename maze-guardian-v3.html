<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>迷宫守护者</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a1a;color:#fff;font-family:sans-serif;overflow:hidden;height:100vh}
canvas{display:block;position:absolute;top:0;left:0}
#menu{position:fixed;inset:0;background:linear-gradient(#1a1a4a,#0a0a1a);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#menu h1{font-size:28px;color:#4ECDC4;text-shadow:0 0 20px #4ECDC4;margin-bottom:10px}
#menu .ver{color:#666;font-size:12px;margin-bottom:40px}
.btn{padding:15px 40px;margin:8px;background:linear-gradient(#2a2a5e,#1a1a3e);border:2px solid #4ECDC4;color:#fff;border-radius:10px;font-size:16px;cursor:pointer;min-width:200px}
.btn:hover{background:linear-gradient(#3a3a7e,#2a2a5e);box-shadow:0 0 15px #4ECDC4}
.btn.red{border-color:#FF6B6B;background:linear-gradient(#5e2a2a,#3e1a1a)}
#ui{position:fixed;top:0;left:0;right:0;padding:10px;display:flex;justify-content:space-between;font-size:16px;font-weight:bold;z-index:10;background:rgba(0,0,0,0.5)}
#ui span{color:#FFD700}
#panel{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:10}
.tbtn{width:48px;height:48px;border-radius:8px;border:2px solid #4ECDC4;background:rgba(0,0,0,0.8);color:#4ECDC4;font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center}
.tbtn .e{font-size:18px}
.tbtn .c{font-size:10px;color:#FFD700}
.tbtn.on{background:rgba(78,205,196,0.3)}
#info{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);border:1px solid #4ECDC4;border-radius:10px;padding:12px;display:none;z-index:20}
#info h4{color:#FFB347;margin-bottom:5px}
#info button{margin-top:8px;padding:6px 12px;border:none;border-radius:5px;cursor:pointer}
#info .up{background:#4ECDC4;color:#000}
#info .sl{background:#FF6B6B;color:#fff}
#skill{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.95);border:2px solid #FFB347;border-radius:15px;padding:20px;display:none;z-index:50}
#skill h3{color:#FFB347;text-align:center;margin-bottom:15px}
.sbtn{display:block;width:100%;padding:10px;margin:5px 0;background:#2a2a5e;border:1px solid #4ECDC4;color:#fff;border-radius:6px;cursor:pointer}
#over{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:60}
#over h1{font-size:32px;color:#FF6B6B;margin-bottom:20px}
#over p{color:#aaa;margin:5px}
#over b{color:#FFD700}
#wave{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;color:#FF6B6B;text-shadow:0 0 20px #FF6B6B;display:none;z-index:30}
#boss{position:fixed;top:45px;left:50%;transform:translateX(-50%);width:180px;display:none;z-index:15}
#boss .b{height:8px;background:#333;border-radius:4px}
#boss .f{height:100%;background:#FF6B6B;border-radius:4px}
#boss .l{text-align:center;font-size:11px;color:#FF6B6B}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="menu">
  <h1>🏰 迷宫守护者</h1>
  <div class="ver">V3.0 正式版</div>
  <button class="btn" id="play">▶ 开始游戏</button>
  <button class="btn red" id="endless">⚔ 无尽挑战</button>
</div>
<div id="ui" style="display:none"><span>💰<b id="g">100</b></span><span>🌊<b id="w">1</b></span><span>❤️<b id="h">20</b></span></div>
<div id="boss"><div class="b"><div class="f" id="bf"></div></div><div class="l">👹 BOSS</div></div>
<div id="wave"></div>
<div id="panel"></div>
<div id="info"><h4 id="in">象牙弓手</h4><div id="is">伤害:15</div><button class="up" id="upBtn">升级</button><button class="sl" id="slBtn">出售</button></div>
<div id="skill"><h3>⚡ 选择强化</h3><div id="sl"></div></div>
<div id="over"><h1>游戏结束</h1><p>波次: <b id="ow">0</b></p><p>击杀: <b id="ok">0</b></p><button class="btn" id="retry">再来</button><button class="btn" id="menuBtn">菜单</button></div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let W,H,S,R,maze=[],towers=[],enemies=[],bullets=[],parts=[];
let gold=100,hp=20,wave=0,kills=0,sel=-1,playing=false,boss=null,shake=0;

const T=[
  {n:'🐘弓手',d:15,r:3,f:60,c:'#FFB347',v:8,ct:50,uc:40},
  {n:'🐻炮塔',d:25,r:2.5,f:50,c:'#8B4513',v:6,ct:100,uc:80,aoe:1},
  {n:'🐰冰冻',d:8,r:2.5,f:70,c:'#E0FFFF',v:5,ct:80,uc:60},
  {n:'🦁火焰',d:40,r:2.5,f:30,c:'#FF4500',v:7,ct:200,uc:150},
  {n:'🐒闪电',d:20,r:2.5,f:40,c:'#FFD700',v:9,ct:150,uc:120},
  {n:'🐉龙神',d:50,r:3,f:25,c:'#4B0082',v:6,ct:300,uc:250,bs:0.5}
];

const E=[
  {h:50,s:1.2,g:5,c:'#8FBC8F',z:0.6},
  {h:150,s:1.0,g:15,c:'#FFA500',z:0.75},
  {h:300,s:0.9,g:30,c:'#9370DB',z:0.9},
  {h:800,s:0.7,g:80,c:'#708090',z:1.2},
  {h:5000,s:0.5,g:500,c:'#4B0082',z:1.5,isBoss:true}
];

const SK=[
  {n:'伤害+20%',f:()=>towers.forEach(t=>t.db=(t.db||0)+0.2)},
  {n:'金币+50',f:()=>gold+=50},
  {n:'治疗+5',f:()=>hp=Math.min(hp+5,20)},
  {n:'全减速',f:()=>enemies.forEach(e=>e.sl=600)}
];

function resize(){
  W=Math.min(innerWidth,480);
  H=Math.min(innerHeight,800);
  S=Math.floor(W/9);
  R=Math.floor(H/S);
  canvas.width=W;
  canvas.height=H;
}

function genMaze(){
  maze=[];
  for(let y=0;y<R;y++){
    maze[y]=[];
    for(let x=0;x<9;x++)maze[y][x]=1;
  }
  function c(x,y){
    maze[y][x]=0;
    let d=[[0,2],[2,0],[0,-2],[-2,0]].sort(()=>Math.random()-0.5);
    for(let[dx,dy]of d){
      let nx=x+dx,ny=y+dy;
      if(nx>0&&nx<8&&ny>0&&ny<R-1&&maze[ny][nx]===1){
        maze[y+dy/2][x+dx/2]=0;
        c(nx,ny);
      }
    }
  }
  c(1,1);
  maze[0][1]=0;
  maze[R-1][7]=0;
}

function path(sx,sy,ex,ey){
  let q=[[sx,sy,[]]],v=new Set([sx+','+sy]),d=[[0,1],[1,0],[0,-1],[-1,0]];
  while(q.length){
    let[x,y,p]=q.shift();
    if(x===ex&&y===ey)return p.concat([[x,y]]);
    for(let[dx,dy]of d){
      let nx=x+dx,ny=y+dy,k=nx+','+ny;
      if(nx>=0&&nx<9&&ny>=0&&ny<R&&maze[ny][nx]!==1&&!v.has(k)){
        v.add(k);
        q.push([nx,ny,p.concat([[x,y]])]);
      }
    }
  }
  return[[sx,sy],[ex,ey]];
}

function spawn(){
  wave++;
  let el=document.getElementById('wave');
  el.textContent=wave%10===0?'👹 BOSS来袭！':'第'+wave+'波';
  el.style.display='block';
  setTimeout(()=>el.style.display='none',1500);
  
  if(wave%10===0){
    let cfg=E[4];
    let hp=cfg.h*(1+wave*0.3);
    let e={...cfg,hp,mx:hp,x:1.5*S,y:0.5*S,pt:path(1,1,7,R-2),pi:0};
    boss=e;
    enemies.push(e);
    document.getElementById('boss').style.display='block';
  }else{
    let n=Math.min(3+wave*2,25);
    let t=[0];
    if(wave>=3)t.push(1);
    if(wave>=6)t.push(2);
    if(wave>=10)t.push(3);
    for(let i=0;i<n;i++){
      let ti=t[Math.floor(Math.random()*t.length)];
      let cfg=E[ti];
      let hp=cfg.h*(1+wave*0.15);
      enemies.push({...cfg,hp,mx:hp,x:1.5*S,y:0.5*S,pt:path(1,1,7,R-2),pi:0});
    }
  }
  upd();
}

function upd(){
  document.getElementById('g').textContent=gold;
  document.getElementById('w').textContent=wave;
  document.getElementById('h').textContent=hp;
  let p=document.getElementById('panel');
  p.innerHTML='';
  T.forEach((t,i)=>{
    let b=document.createElement('div');
    b.className='tbtn'+(sel===i?' on':'');
    b.innerHTML='<span class="e">'+t.n[0]+'</span><span class="c">'+t.ct+'</span>';
    b.style.opacity=gold>=t.ct?1:0.4;
    b.onclick=()=>{if(gold>=t.ct){sel=sel===i?-1:i;upd();}};
    p.appendChild(b);
  });
}

function loop(){
  if(!playing)return;
  
  if(enemies.length===0)spawn();
  
  // enemies
  for(let i=enemies.length-1;i>=0;i--){
    let e=enemies[i];
    let sp=e.s;
    if(e.sl>0){sp*=0.5;e.sl--;}
    e.pi+=sp/60;
    let idx=Math.min(Math.floor(e.pi),e.pt.length-1);
    if(e.pt[idx]){
      e.x=(e.pt[idx][0]+0.5)*S;
      e.y=(e.pt[idx][1]+0.5)*S;
    }
    if(e.pi>=e.pt.length-1){
      hp--;
      shake=15;
      enemies.splice(i,1);
      upd();
      if(hp<=0)gameOver();
      continue;
    }
    if(e.isBoss&&boss===e){
      document.getElementById('bf').style.width=Math.max(0,e.hp/e.mx*100)+'%';
    }
  }
  
  // towers
  for(let t of towers){
    if(t.cd>0){t.cd--;continue;}
    let tx=(t.x+0.5)*S,ty=(t.y+0.5)*S,rg=T[t.t].r*S;
    let tg=null,md=Infinity;
    for(let e of enemies){
      let d=Math.hypot(e.x-tx,e.y-ty);
      if(d<rg&&d<md){md=d;tg=e;}
    }
    if(tg){
      t.cd=T[t.t].f/60;
      let dm=T[t.t].d*(1+(t.db||0));
      if(T[t.t].bs&&tg.isBoss)dm*=1+T[t.t].bs;
      let a=Math.atan2(tg.y-ty,tg.x-tx);
      bullets.push({x:tx,y:ty,vx:Math.cos(a)*T[t.t].v,vy:Math.sin(a)*T[t.t].v,dm,c:T[t.t].c,tt:t.t});
    }
  }
  
  // bullets
  for(let i=bullets.length-1;i>=0;i--){
    let b=bullets[i];
    b.x+=b.vx;
    b.y+=b.vy;
    if(b.x<0||b.x>W||b.y<0||b.y>H){bullets.splice(i,1);continue;}
    for(let j=enemies.length-1;j>=0;j--){
      let e=enemies[j];
      if(Math.hypot(e.x-b.x,e.y-b.y)<e.z*S*0.4){
        e.hp-=b.dm;
        if(T[b.tt].aoe){
          for(let k=enemies.length-1;k>=0;k--){
            let o=enemies[k];
            if(o!==e&&Math.hypot(o.x-b.x,o.y-b.y)<T[b.tt].aoe*S)o.hp-=b.dm*0.5;
          }
        }
        bullets.splice(i,1);
        if(e.hp<=0){
          gold+=e.g;
          kills++;
          if(e.isBoss){
            gold+=500;
            document.getElementById('boss').style.display='none';
            boss=null;
          }
          enemies.splice(j,1);
        }
        break;
      }
    }
  }
  
  // particles
  for(let i=parts.length-1;i>=0;i--){
    let p=parts[i];
    p.x+=p.vx;
    p.y+=p.vy;
    p.vy+=0.1;
    p.l--;
    if(p.l<=0)parts.splice(i,1);
  }
  
  render();
  requestAnimationFrame(loop);
}

function render(){
  let ox=0,oy=0;
  if(shake>0){
    ox=(Math.random()-0.5)*shake;
    oy=(Math.random()-0.5)*shake;
    shake*=0.9;
    if(shake<0.5)shake=0;
  }
  ctx.save();
  ctx.translate(ox,oy);
  
  ctx.fillStyle='#0a0a1a';
  ctx.fillRect(0,0,W,H);
  
  // maze
  for(let y=0;y<R;y++){
    for(let x=0;x<9;x++){
      if(maze[y][x]===1){
        ctx.fillStyle='#1a1a3a';
        ctx.fillRect(x*S+1,y*S+1,S-2,S-2);
      }else{
        ctx.fillStyle='#0f0f22';
        ctx.fillRect(x*S,y*S,S,S);
      }
    }
  }
  
  // spawn/end
  ctx.fillStyle='rgba(0,255,100,0.1)';
  ctx.fillRect(S,0,S,S);
  ctx.fillStyle='rgba(255,60,60,0.1)';
  ctx.fillRect(7*S,(R-1)*S,S,S);
  
  // towers
  for(let t of towers){
    let tx=(t.x+0.5)*S,ty=(t.y+0.5)*S,cf=T[t.t];
    ctx.beginPath();
    ctx.arc(tx,ty,S*0.35,0,Math.PI*2);
    ctx.fillStyle=cf.c+'44';
    ctx.fill();
    ctx.strokeStyle=cf.c;
    ctx.lineWidth=2;
    ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.font='bold '+(S*0.3)+'px sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText((t.lv||0)+1,tx,ty);
  }
  
  // enemies
  for(let e of enemies){
    let sz=e.z*S*0.4;
    ctx.beginPath();
    ctx.arc(e.x,e.y,sz,0,Math.PI*2);
    ctx.fillStyle=e.c;
    ctx.fill();
    if(!e.isBoss){
      ctx.fillStyle='#333';
      ctx.fillRect(e.x-sz,e.y-sz-4,sz*2,3);
      ctx.fillStyle=e.hp/e.mx>0.5?'#4c4':e.hp/e.mx>0.25?'#cc4':'#c44';
      ctx.fillRect(e.x-sz,e.y-sz-4,sz*2*(e.hp/e.mx),3);
    }
  }
  
  // bullets
  for(let b of bullets){
    ctx.beginPath();
    ctx.arc(b.x,b.y,3,0,Math.PI*2);
    ctx.fillStyle=b.c;
    ctx.fill();
  }
  
  // particles
  ctx.globalAlpha=0.5;
  for(let p of parts){
    ctx.beginPath();
    ctx.arc(p.x,p.y,2,0,Math.PI*2);
    ctx.fillStyle=p.c;
    ctx.fill();
  }
  ctx.globalAlpha=1;
  
  ctx.restore();
}

function startGame(){
  document.getElementById('menu').style.display='none';
  document.getElementById('ui').style.display='flex';
  document.getElementById('over').style.display='none';
  
  resize();
  genMaze();
  
  gold=100;
  hp=20;
  wave=0;
  kills=0;
  sel=-1;
  towers=[];
  enemies=[];
  bullets=[];
  parts=[];
  boss=null;
  shake=0;
  playing=true;
  
  upd();
  loop();
}

function gameOver(){
  playing=false;
  document.getElementById('ow').textContent=wave;
  document.getElementById('ok').textContent=kills;
  document.getElementById('over').style.display='flex';
}

function showMenu(){
  playing=false;
  document.getElementById('over').style.display='none';
  document.getElementById('ui').style.display='none';
  document.getElementById('menu').style.display='flex';
}

// events
document.getElementById('play').onclick=startGame;
document.getElementById('endless').onclick=startGame;
document.getElementById('retry').onclick=startGame;
document.getElementById('menuBtn').onclick=showMenu;

canvas.onclick=function(e){
  if(!playing)return;
  let rect=canvas.getBoundingClientRect();
  let x=Math.floor((e.clientX-rect.left)/S);
  let y=Math.floor((e.clientY-rect.top)/S);
  if(x<0||x>=9||y<0||y>=R)return;
  
  // click tower
  let tw=towers.find(t=>t.x===x&&t.y===y);
  if(tw){
    sel=-1;
    let cf=T[tw.t];
    document.getElementById('in').textContent=cf.n+' Lv.'+((tw.lv||0)+1);
    document.getElementById('is').textContent='伤害:'+Math.round(cf.d*(1+(tw.db||0)));
    document.getElementById('upBtn').onclick=function(){
      if(gold>=cf.uc&&(tw.lv||0)<2){
        gold-=cf.uc;
        tw.lv=(tw.lv||0)+1;
        upd();
      }
    };
    document.getElementById('slBtn').onclick=function(){
      gold+=Math.floor(cf.ct*0.5);
      maze[y][x]=0;
      towers=towers.filter(t=>t!==tw);
      document.getElementById('info').style.display='none';
      upd();
    };
    document.getElementById('info').style.display='block';
    upd();
    return;
  }
  
  // place tower
  if(sel>=0&&gold>=T[sel].ct&&maze[y][x]===0){
    gold-=T[sel].ct;
    towers.push({x,y,t:sel,lv:0,cd:0});
    maze[y][x]=2;
    sel=-1;
    upd();
  }
  
  document.getElementById('info').style.display='none';
};

resize();
</script>
</body>
</html>
