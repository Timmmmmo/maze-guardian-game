<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎯 猜猜看 - GuessMaster</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a1a;--card:#141432;--card2:#1e1e45;
  --accent:#6c5ce7;--accent2:#a29bfe;--success:#00cec9;--danger:#ff6b6b;
  --gold:#fdcb6e;--warn:#ffa502;--text:#e8e8f0;--text2:#6e6e8a;
  --radius:16px;--shadow:0 8px 32px rgba(108,92,231,.25);
}
html,body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;min-height:100dvh;
  overflow-x:hidden;overflow-y:auto;-webkit-tap-highlight-color:transparent;
  -webkit-text-size-adjust:100%
}
/* 背景 */
.bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 20% 50%,rgba(108,92,231,.08) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 20%,rgba(0,206,201,.06) 0%,transparent 50%)}
.particle{position:absolute;border-radius:50%;opacity:.10;animation:drift 25s infinite ease-in-out}
@keyframes drift{0%,100%{transform:translateY(0) translateX(0)}25%{transform:translateY(-60px) translateX(30px)}
50%{transform:translateY(-20px) translateX(-20px)}75%{transform:translateY(-80px) translateX(10px)}}

.container{width:100%;max-width:460px;margin:0 auto;padding:12px;padding-bottom:40px;z-index:1;position:relative}

/* 头部 */
.hd{text-align:center;padding:14px 0 10px}
.hd h1{font-size:24px;font-weight:800;background:linear-gradient(135deg,#6c5ce7,#a29bfe,#00cec9);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px}
.hd .sub{font-size:11px;color:var(--text2);margin-top:2px;letter-spacing:3px;text-transform:uppercase}

/* 统计 */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.st-card{background:var(--card);border-radius:12px;padding:8px 4px;text-align:center;border:1px solid rgba(108,92,231,.15)}
.st-v{font-size:17px;font-weight:800;color:var(--accent2)}
.st-l{font-size:10px;color:var(--text2);margin-top:1px}

/* 进度点 */
.dots-wrap{display:flex;gap:3px;justify-content:center;margin-bottom:10px;flex-wrap:wrap;padding:0 4px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--card2);transition:all .3s}
.dot.done{background:var(--success);transform:scale(.85)}
.dot.cur{background:var(--accent);box-shadow:0 0 8px var(--accent);transform:scale(1.3)}

/* 关卡栏 */
.lv-bar{display:flex;justify-content:space-between;align-items:center;
  background:var(--card);border-radius:12px;padding:8px 14px;margin-bottom:10px;
  border:1px solid rgba(108,92,231,.18)}
.lv-left{display:flex;align-items:center;gap:7px}
.lv-num{font-size:18px;font-weight:800;color:var(--gold)}
.lv-type{font-size:11px;font-weight:700;padding:3px 9px;border-radius:10px}
.t-item{background:linear-gradient(135deg,#ff6b6b,#ee5a5a);color:#fff}
.t-geo{background:linear-gradient(135deg,#74b9ff,#0984e3);color:#fff}
.t-city{background:linear-gradient(135deg,#55efc4,#00b894);color:#fff}
.chances{display:flex;gap:3px}
.cd{width:8px;height:8px;border-radius:50%;background:var(--accent);transition:all .3s}
.cd.u{background:var(--card2);opacity:.25;transform:scale(.5)}
.cd.lo{background:var(--danger);animation:blink .5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* 题目卡片 */
.q-card{background:var(--card);border-radius:var(--radius);padding:18px 16px;margin-bottom:10px;
  border:1px solid rgba(108,92,231,.18);position:relative;overflow:hidden;transition:transform .3s}
.q-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent),var(--success),var(--gold));opacity:.5}
.q-badge{display:inline-block;padding:3px 10px;border-radius:16px;font-size:10px;font-weight:700;
  margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.q-icon{font-size:44px;text-align:center;margin:6px 0;animation:bounce 2.5s infinite ease-in-out}
@keyframes bounce{0%,100%{transform:scale(1) translateY(0)}50%{transform:scale(1.06) translateY(-5px)}}
.q-hint{font-size:14px;line-height:1.7;color:var(--text2);min-height:38px;text-align:center}
.q-hint-btn{display:block;margin:6px auto 0;padding:3px 14px;border-radius:10px;
  background:rgba(108,92,231,.1);color:var(--accent2);font-size:11px;border:none;cursor:pointer}

/* 概率区 */
.prob-sec{margin-bottom:10px}
.prob-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.prob-lbl span:last-child{font-weight:700}
.prob-wrap{background:var(--card);border-radius:12px;padding:3px;border:1px solid rgba(108,92,231,.12)}
.prob-bg{height:28px;border-radius:10px;background:var(--card2);overflow:hidden;position:relative}
.prob-fill{height:100%;border-radius:10px;transition:width .4s cubic-bezier(.22,1,.36,1);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;
  text-shadow:0 1px 3px rgba(0,0,0,.4);min-width:34px;white-space:nowrap}
.hist{max-height:100px;overflow-y:auto;margin-top:6px}
.hist::-webkit-scrollbar{width:3px}
.hist::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
.hi{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;
  font-size:11px;border-radius:6px;margin-bottom:2px;background:rgba(255,255,255,.02)}
.hi-a{color:var(--accent2);font-weight:600;max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hi-p{font-weight:700;font-size:12px}

/* 输入区 - 关键修复：确保始终可见 */
.in-area{margin-bottom:10px;position:relative;z-index:5}
.in-hint{text-align:center;font-size:11px;color:var(--text2);margin-bottom:6px;min-height:16px}
.in-row{display:flex;gap:8px;align-items:center}
.in-row input{flex:1;height:48px;border-radius:14px;border:2px solid var(--card2);
  background:var(--card);color:var(--text);font-size:16px;padding:0 14px;outline:none;
  transition:border-color .3s, box-shadow .3s;-webkit-appearance:none;appearance:none}
.in-row input:focus{border-color:var(--accent);box-shadow:0 0 18px rgba(108,92,231,.2)}
.in-row input::placeholder{color:var(--text2);font-size:13px}
.btn-go{height:48px;min-width:72px;padding:0 16px;border-radius:14px;border:none;
  background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;transition:transform .15s,box-shadow .15s;white-space:nowrap;flex-shrink:0}
.btn-go:hover{transform:scale(1.02);box-shadow:var(--shadow)}
.btn-go:active{transform:scale(.95)}

/* 广告 */
.btn-ad{width:100%;height:40px;border-radius:12px;border:2px dashed var(--gold);
  background:rgba(253,203,110,.06);color:var(--gold);font-size:12px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .3s;margin-bottom:10px}
.btn-ad:hover:not(:disabled){background:rgba(253,203,110,.12);transform:scale(1.01)}
.btn-ad:disabled{opacity:.35;cursor:not-allowed}

/* 弹窗 */
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.72);backdrop-filter:blur(10px);z-index:100;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--card);border-radius:22px;padding:30px 20px;width:88%;max-width:340px;
  text-align:center;border:1px solid rgba(108,92,231,.25);
  transform:scale(.8);transition:transform .4s cubic-bezier(.22,1,.36,1)}
.overlay.show .modal{transform:scale(1)}
.m-icon{font-size:52px;margin-bottom:8px}
.m-title{font-size:22px;margin-bottom:6px;font-weight:800}
.m-desc{color:var(--text2);font-size:13px;line-height:1.7;margin-bottom:16px}
.m-answer{background:var(--card2);border-radius:12px;padding:12px;margin-bottom:16px}
.m-answer .al{font-size:11px;color:var(--text2)}
.m-answer .av{font-size:19px;font-weight:800;color:var(--gold);margin-top:3px}
.btn-m{padding:12px 32px;border-radius:14px;border:none;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s}
.btn-m.pri{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:#fff}
.btn-m.pri:hover{transform:scale(1.03)}
.btn-m.sec{background:var(--card2);color:var(--text);border:1px solid rgba(108,92,231,.25)}

/* 广告模拟弹窗 */
.ad-overlay{position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.85);z-index:150;display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s}
.ad-overlay.show{opacity:1;pointer-events:auto}
.ad-box{background:var(--card);border-radius:18px;padding:26px;width:85%;max-width:280px;text-align:center;border:1px solid rgba(108,92,231,.25)}
.ad-count{font-size:44px;font-weight:800;color:var(--gold);margin:14px 0}
.ad-label{font-size:13px;color:var(--text2)}

/* 撒花 */
.confetti-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:200}

/* 动画 */
.pop{animation:popIn .4s cubic-bezier(.22,1,.36,1)}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}
.flash{animation:flash .3s}
@keyframes flash{0%,100%{}50%{background:rgba(0,206,201,.15)}}

@media(max-height:720px){
  .hd{padding:10px 0 6px}.hd h1{font-size:21px}
  .q-card{padding:14px 14px}.q-icon{font-size:38px}
  .hist{max-height:70px}
  .in-row input{height:42px}.btn-go{height:42px;min-width:64px}
}
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<div class="container">
  <div class="hd"><h1>🎯 猜猜看</h1><div class="sub">GUESSMASTER</div></div>

  <div class="stats">
    <div class="st-card"><div class="st-v" id="svLv">1/50</div><div class="st-l">关卡</div></div>
    <div class="st-card"><div class="st-v" id="svStk">0</div><div class="st-l">连胜</div></div>
    <div class="st-card"><div class="st-v" id="svSc">0</div><div class="st-l">总分</div></div>
  </div>

  <div class="dots-wrap" id="dots"></div>

  <div class="lv-bar">
    <div class="lv-left">
      <span class="lv-num" id="lvNum">Lv.1</span>
      <span class="lv-type t-item" id="lvType">物品</span>
    </div>
    <div class="chances" id="chDots"></div>
  </div>

  <div class="q-card pop" id="qCard">
    <div class="q-badge t-item" id="qBadge">📦 物品</div>
    <div class="q-icon" id="qIcon">❓</div>
    <div class="q-hint" id="qHint">加载中...</div>
    <button class="q-hint-btn" id="hintBtn" onclick="nextHint()" style="display:none">💡 换一条提示</button>
  </div>

  <div class="prob-sec">
    <div class="prob-lbl"><span>匹配概率</span><span id="probTxt">输入答案开始</span></div>
    <div class="prob-wrap"><div class="prob-bg"><div class="prob-fill" id="probFill" style="width:0%">0%</div></div></div>
    <div class="hist" id="hist"></div>
  </div>

  <!-- 输入区：确保在视口内 -->
  <div class="in-area" id="inArea">
    <div class="in-hint" id="inHint">💡 输入你的猜测，越接近答案概率越高！</div>
    <div class="in-row">
      <input type="text" id="ansInput" placeholder="输入答案..." autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" enterkeyhint="go">
      <button class="btn-go" id="goBtn" type="button">提交 🚀</button>
    </div>
  </div>

  <button class="btn-ad" id="adBtn" type="button" onclick="watchAd()"><span>📺</span> 观看广告获得 +3 次机会</button>
</div>

<!-- 结果弹窗 -->
<div class="overlay" id="overlay">
  <div class="modal" id="modalBox">
    <div class="m-icon" id="mIcon">🎉</div>
    <h2 class="m-title" id="mTitle">恭喜过关！</h2>
    <p class="m-desc" id="mDesc">你成功猜出了正确答案！</p>
    <div class="m-answer" id="mAnswer" style="display:none">
      <div class="al">正确答案是</div><div class="av" id="mAv">-</div>
    </div>
    <button class="btn-m pri" id="mBtn" type="button" onclick="nxtLv()">下一关 →</button>
  </div>
</div>

<!-- 广告弹窗 -->
<div class="ad-overlay" id="adOverlay">
  <div class="ad-box">
    <div style="font-size:28px;margin-bottom:6px">📺</div>
    <div style="font-size:15px;font-weight:700;color:var(--text)">广告播放中...</div>
    <div style="font-size:11px;color:var(--text2);margin-top:3px">感谢支持，请稍候</div>
    <div class="ad-count" id="adCount">5</div>
    <div class="ad-label">秒后获得 +3 机会</div>
  </div>
</div>

<canvas class="confetti-canvas" id="confetti"></canvas>

<script>

// ==================== 工具函数 ====================
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

// 相似度计算 - 支持城市距离模式
function calcSim(input,target,targetCoords){
  const a=input.trim().toLowerCase(), b=target.trim().toLowerCase();
  if(!a||!b)return 1;
  if(a===b)return 99;
  
  // 城市距离模式: 如果有坐标数据，使用距离算法
  if(targetCoords&&targetCoords[0]){
    // 先用文字相似度找到候选城市
    const guess=pickCityByName(a,b);
    if(guess){
      const dist=calcDist(guess[0],guess[1],targetCoords[0],targetCoords[1]);
      return distToProb(dist);
    }
  }
  
  // 包含关系
  if(b.includes(a)&&a.length>=2)return Math.min(99,85+Math.floor(Math.random()*10));
  if(a.includes(b)&&b.length>=2)return Math.min(99,80+Math.floor(Math.random()*10));
  
  // 编辑距离 (Levenshtein)
  const m=[];
  for(let i=0;i<=a.length;i++){m[i]=[i];for(let j=1;j<=b.length;j++){
    if(i===0)m[0][j]=j;else{const c=a[i-1]===b[j-1]?0:1;m[i][j]=Math.min(m[i-1][j]+1,m[i][j-1]+1,m[i-1][j-1]+c)}
  }}
  const ed=m[a.length][b.length];
  const ml=Math.max(a.length,b.length);
  let sim=Math.round((1-ed/ml)*100);
  
  // 首字匹配加分
  if(a[0]&&b[0]&&a[0]===b[0])sim+=10;
  // 长度差异惩罚
  sim-=Math.abs(a.length-b.length)*2;
  // 字符重叠加分
  const bc=[...new Set(b.split(''))];
  let mc=0;for(const ch of bc){if(a.includes(ch))mc++}
  sim+=Math.floor((mc/bc.length)*15);
  
  return Math.min(99,Math.max(1,sim));
}

// 根据用户输入的城市名找到对应坐标
function pickCityByName(input,target){
  // 找和输入最接近的城市名
  let best=null,bestScore=0;
  for(const [name,coords] of Object.entries(CITY_COORDS)){
    const n=name.toLowerCase();
    if(n===input)return coords;
    if(input.length>=2&&(n.includes(input)||n.startsWith(input))){
      const score=input.length*2-(Math.abs(coords[0]||0)-30)**2/100;
      if(score>bestScore){{bestScore=score;best=coords;}
    }
  }
  return best;
}

// Haversine公式计算两点间距离(km)
function calcDist(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*Math.sin(dLon/2);
  const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
  return R*c;
}
// 根据距离计算匹配��(km->%)
function distToProb(km){
  if(km<50)return 95+Math.floor(Math.random()*4);
  if(km<150)return 85+Math.floor(Math.random()*10);
  if(km<300)return 70+Math.floor(Math.random()*15);
  if(km<500)return 55+Math.floor(Math.random()*15);
  if(km<800)return 40+Math.floor(Math.random()*15);
  return Math.max(5,25+Math.floor((800-km)/40));
}
// 计算方向描述
function getDirHint(targetLat,targetLon,guessLat,guessLon){
  const dLat=guessLat-targetLat;
  const dLon=guessLon-targetLon;
  let dir="";
  if(Math.abs(dLon)>Math.abs(dLat)){
    dir=dLon>0?"东":"西";
  }else{
    dir=dLat>0?"南":"北";
  }
  const dist=Math.abs(dLon)>Math.abs(dLat)?Math.abs(dLon):Math.abs(dLat);
  if(dist>5)dir+="偏"+(dist>8?"远":"近");
  return dir?`答案在你猜测方向的${dir}面`:"你在答案附近";
}
function genQuestion(){
  // typeKey映射：数据库key是复数形式
  const typeKeys=[{k:'items',t:'item'},{k:'geo',t:'geo'},{k:'cities',t:'city'}];
  const picked=pick(typeKeys);
  const pool=DB[picked.k];
  if(!pool||!pool.length){console.error('Empty pool:',picked.k);return{name:'未知',hints:['加载失败'],icon:'❓',type:'item'}}
  
  // 尽量选没用过的题目
  let available=pool.filter(x=>!state._used[x.name]);
  if(available.length<3)available=pool;
  
  const q=pick(available);
  q.type=picked.t;
  state._used[q.name]=true;
  return q;
}

function nextHint(){
  if(!state.q||!state.q.hints||state.q.hints.length<=1)return;
  state.hintIdx=(state.hintIdx||0)+1;
  if(state.hintIdx>=state.q.hints.length)state.hintIdx=0;
  document.getElementById('qHint').textContent=state.q.hints[state.hintIdx];
}

function submitAns(){
  const input=document.getElementById('ansInput');
  if(!input)return;
  const val=(input.value||'').trim();
  if(!val){input.classList.add('shake');setTimeout(()=>input.classList.remove('shake'),400);input.focus();return}
  if(state.chances<=0)return;
  
  state.chances--;
  const targetCoords=state.q.type==='city'?CITY_COORDS[state.q.name]:null;
  const prob=calcSim(val,state.q.name,targetCoords);
  state.history.push({a:val,p:prob});
  
  updateProbBar(prob);
  renderHist();
  renderChances();
  input.value='';
  input.focus();
  document.getElementById('inHint').textContent=prob>=70?'🔥 很接近了！再试试！':prob>=40?'🤔 方向对了，继续加油！':'💪 再想想，换个角度？';
  
  if(prob>=95){
    setTimeout(()=>showResult(true),500);
  }else if(state.chances<=0){
    setTimeout(()=>showResult(false),600);
  }
}

  if(win){
    const bonus=(state.chances*10)+(state.streak*5)-(state.usedAd?30:0);
    const pts=100+Math.max(0,bonus);
    state.score+=pts;
    state.streak++;
    state.completed.push(state.level);
    
    icon.textContent=state.streak>=3?'🔥':state.streak>=5?'⚡':'🎉';
    title.textContent=state.streak>=3?`${state.streak}连胜！`:'恭喜过关！';
    desc.textContent=`匹配成功！本关得分 ${pts} 分`;
    ans.style.display='none';
    
    if(state.level>=state.totalLevels){
      btn.textContent='查看成绩 🏆';
      btn.onclick=showFinal;
    }else{
      btn.textContent='下一关 →';
      btn.onclick=nxtLv;
    }
    
    fireConfetti();
  }else{
    state.streak=0;
    icon.textContent='💔';title.textContent='挑战失败';
    desc.textContent=`机会用完了！正确答案是：`;
    ans.style.display='block';av.textContent=state.q.name+' '+(state.q.icon||'');
    btn.textContent='再试一次 💪';
    btn.onclick=nxtLv;
  }
  
  o.classList.add('show');
  renderStats();renderDots();
}

function nxtLv(){
  document.getElementById('overlay').classList.remove('show');
  if(state.level<state.totalLevels||(state.completed.includes(state.level))){
    state.level++;
  }
  state.chances=state.maxCh;state.history=[];state.hintIdx=0;state.usedAd=false;
  state.q=genQuestion();
  document.getElementById('probFill').style.width='0%';
  document.getElementById('probFill').textContent='0%';
  document.getElementById('probTxt').textContent='输入答案开始';
  document.getElementById('probTxt').style.color='var(--text2)';
  document.getElementById('hist').style.display='none';
  document.getElementById('inHint').textContent='💡 输入你的猜测，越接近答案概率越高！';
  document.getElementById('adBtn').disabled=false;
  renderAll();
  // 聚焦输入框
  setTimeout(()=>{const inp=document.getElementById('ansInput');if(inp)inp.focus()},300);
}

function showFinal(){
  document.getElementById('overlay').classList.remove('show');
  const o=document.getElementById('overlay');
  const icon=document.getElementById('mIcon'),title=document.getElementById('mTitle'),
    desc=document.getElementById('mDesc'),ans=document.getElementById('mAnswer'),
    btn=document.getElementById('mBtn');
  
  let rank='',rIcon='';
  if(state.score>=4500){rank='🏆 猜测大师';rIcon='👑'}
  else if(state.score>=3500){rank='🥇 猜测专家';rIcon='🌟'}
  else if(state.score>=2500){rank='🥈 猜猜高手';rIcon='💎'}
  else if(state.score>=1500){rank='🥉 猜猜新秀';rIcon='🎯'}
  else{rank='💪 继续努力';rIcon='💪'}
  
  icon.textContent=rIcon;
  title.textContent='🎊 全部通关！';
  title.style.cssText='background:linear-gradient(135deg,#fdcb6e,#ff6b6e,#6c5ce7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:24px';
  desc.innerHTML=`最终得分：<strong style="color:var(--gold);font-size:20px">${state.score}</strong> 分<br><br>${rank}`;
  ans.style.display='none';
  btn.textContent='重新开始 🔄';
  btn.onclick=()=>{location.reload()};
  
  o.classList.add('show');
  fireConfetti();fireConfetti();
}

// ==================== 广告系统 ====================
let adTimer=null;
function watchAd(){
  if(state.usedAd)return;
  const ao=document.getElementById('adOverlay');
  ao.classList.add('show');
  let cnt=5;
  document.getElementById('adCount').textContent=cnt;
  if(adTimer)clearInterval(adTimer);
  adTimer=setInterval(()=>{
    cnt--;
    document.getElementById('adCount').textContent=cnt;
    if(cnt<=0){
      clearInterval(adTimer);adTimer=null;
      ao.classList.remove('show');
      state.chances+=3;
      state.usedAd=true;
      state.score=Math.max(0,state.score-30);
      document.getElementById('adBtn').disabled=true;
      renderChances();
      renderStats();
      document.getElementById('inHint').textContent='📺 +3次机会已获得！（-30分）';
    }
  },1000);
}

// ==================== 撒花特效 ====================
function fireConfetti(){
  const cv=document.getElementById('confetti');
  if(!cv)return;
  const ctx=cv.getContext('2d');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const particles=[];
  const colors=['#6c5ce7','#a29bfe','#00cec9','#fdcb6e','#ff6b6b','#81ecec','#ffeaa7'];
  for(let i=0;i<70;i++){
    particles.push({
      x:cv.width/2,y:cv.height/2,
      vx:(Math.random()-0.5)*14,vy:(Math.random()-0.5)*14-8,
      g:.25,size:4+Math.random()*7,c:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*360,rs:(Math.random()-0.5)*10,a:1
    });
  }
  function tick(){
    ctx.clearRect(0,0,cv.width,cv.height);
    let alive=false;
    for(const p of particles){
      p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.rs;p.a-=.008;
      if(p.a>0){alive=true;ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
        ctx.globalAlpha=Math.max(0,p.a);ctx.fillStyle=p.c;
        ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*.6);ctx.restore()}
    }
    if(alive)requestAnimationFrame(tick);else ctx.clearRect(0,0,cv.width,cv.height);
  }
  tick();
}

// ==================== 初始化 ====================
function renderAll(){
  renderStats();renderDots();renderChances();renderQ();
}

function init(){
  try {
    initState();
    renderBg();
    state.q=genQuestion();
    
    if(!state.q||!state.q.name){
      document.getElementById('qHint').textContent='⚠️ 题目加载失败，请刷新页面';
      console.error('Question generation failed');
      return;
    }
    
    renderAll();
    
    // ===== 关键修复：事件绑定 =====
    const ansInput=document.getElementById('ansInput');
    const goBtn=document.getElementById('goBtn');
    
    // 回车键提交
    if(ansInput){
      ansInput.addEventListener('keydown',function(e){
        if(e.key==='Enter'||e.keyCode===13){
          e.preventDefault();
          submitAns();
        }
      });
      
      // 实时预览概率
      ansInput.addEventListener('input',function(e){
        const v=(e.target.value||'').trim();
        if(v&&state.q){
          const targetCoords=state.q.type==='city'?CITY_COORDS[state.q.name]:null;
          const p=calcSim(v,state.q.name,targetCoords);
          updateProbBar(p);
        }
      });
      
      // 自动聚焦
      ansInput.addEventListener('focus',function(){});
    }
    
    // 提交按钮点击
    if(goBtn){
      goBtn.addEventListener('click',function(e){
        e.preventDefault();
        submitAns();
      });
    }
    
    // 页面加载后聚焦输入框
    setTimeout(function(){
      if(ansInput)ansInput.focus();
    },500);
    
  } catch(err){
    console.error('Init error:',err);
    document.getElementById('qHint').textContent='⚠️ 游戏初始化失败：'+err.message;
  }
}

// 确保 DOM 加载完成后初始化
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',init);
}else{
  init();
}
</script>
