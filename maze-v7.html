<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>迷宫塔防 V7</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--gold:#FFD700;--green:#4CAF50;--red:#F44336;--cyan:#00BCD4}
body{background:#0a0a1a;font-family:sans-serif;overflow:hidden;touch-action:none}
#game{width:100vw;height:100vh;display:flex;flex-direction:column}
#top{height:50px;background:#1a1a3a;display:flex;align-items:center;justify-content:space-around;border-bottom:1px solid #3a3a6a}
.stat{display:flex;align-items:center;gap:5px;font-size:16px;color:#aaa}
.stat b{color:var(--gold);font-size:22px;text-shadow:0 0 10px rgba(255,215,0,0.5)}
#canvas-box{flex:1;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}
#entry-mark{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#00C853,#00E676);color:#fff;padding:8px 20px;border-radius:24px;font-size:14px;font-weight:bold;box-shadow:0 4px 16px rgba(0,200,83,0.6);z-index:10}
#exit-mark{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#FF5252,#FF1744);color:#fff;padding:8px 20px;border-radius:24px;font-size:14px;font-weight:bold;box-shadow:0 4px 16px rgba(255,82,82,0.6);z-index:10}
#tip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.9);color:#fff;padding:16px 24px;border-radius:16px;font-size:16px;font-weight:bold;z-index:30;pointer-events:none;opacity:0;transition:opacity 0.3s}
#tip.show{opacity:1}
#wave-msg{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:42px;font-weight:bold;color:var(--green);text-shadow:0 0 40px var(--green);display:none;z-index:20}
#info{position:absolute;top:60px;right:10px;background:rgba(0,0,0,0.88);border:1px solid var(--cyan);border-radius:14px;padding:14px;font-size:13px;color:#aaa;z-index:10}
#info h4{color:var(--cyan);margin-bottom:8px;font-size:14px}
#info p{margin:5px 0}
#info b{color:var(--gold)}
.good{color:var(--green)!important}
.bad{color:var(--red)!important}
#bottom{height:165px;background:#1a1a3a;border-top:1px solid #3a3a6a;padding:10px;display:flex;flex-direction:column;gap:6px}
#current-tool{height:26px;background:rgba(0,0,0,0.4);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#888}
#current-tool b{color:var(--gold)}
#tower-panel{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:6px;background:rgba(0,0,0,0.3);border-radius:12px}
.tower-btn{width:54px;height:54px;border-radius:12px;border:2px solid #555;background:#222;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
.tower-btn.selected{border-color:var(--gold);background:#333;box-shadow:0 0 20px rgba(255,215,0,0.5)}
.tower-btn .icon{font-size:22px}
.tower-btn .price{font-size:11px;color:var(--gold);font-weight:bold;margin-top:2px}
.tower-btn .name{font-size:9px;color:#888}
.tower-btn.disabled{opacity:0.4;pointer-events:none}
#toolbar{display:flex;gap:12px;justify-content:center}
.tool-btn{width:68px;height:45px;border-radius:12px;border:2px solid #555;background:#222;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
.tool-btn.selected{border-color:var(--gold);background:#333;box-shadow:0 0 16px rgba(255,215,0,0.4)}
.tool-btn .icon{font-size:18px}
.tool-btn .name{font-size:11px;color:#aaa;margin-top:2px}
#actions{display:flex;gap:12px;justify-content:center}
.act-btn{padding:12px 28px;border-radius:24px;border:none;font-size:14px;font-weight:bold;cursor:pointer}
#btn-fight{background:linear-gradient(135deg,var(--green),#388E3C);color:#fff;box-shadow:0 4px 16px rgba(76,175,80,0.5)}
#btn-undo{background:linear-gradient(135deg,#FF9800,#F57C00);color:#fff}
#btn-clear{background:linear-gradient(135deg,#78909C,#546E7A);color:#fff}
#menu{position:absolute;inset:0;background:linear-gradient(135deg,#1a1a3a,#0a0a1a);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#menu h1{color:var(--cyan);font-size:36px;margin-bottom:10px;text-shadow:0 0 30px rgba(0,188,212,0.6)}
#menu h2{color:#888;font-size:18px;margin-bottom:32px;font-weight:normal}
.menu-btn{width:220px;padding:18px;margin:12px 0;background:linear-gradient(135deg,#2a2a4a,#3a3a5a);border:2px solid #6a6aaa;color:#fff;border-radius:18px;font-size:20px;cursor:pointer}
.guide{margin-top:32px;padding:18px;background:rgba(0,0,0,0.4);border-radius:16px;max-width:300px}
.guide h3{color:var(--cyan);font-size:16px;margin-bottom:14px}
.guide p{color:#aaa;font-size:14px;margin:8px 0;line-height:1.7}
#over{position:absolute;inset:0;background:rgba(0,0,0,0.94);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:90}
#over h1{font-size:40px;color:var(--red);margin-bottom:28px}
#over b{color:var(--gold)}
</style>
</head>
<body>
<div id="menu">
<h1>🏰 迷宫塔防</h1>
<h2>建造迷宫 · 阻止入侵</h2>
<button class="menu-btn" onclick="startGame()">▶ 开始游戏</button>
<div class="guide">
<h3>🎯 玩法说明</h3>
<p>1️⃣ 点击下方塔图标选择塔类型</p>
<p>2️⃣ 点击网格空地放置塔</p>
<p>3️⃣ 点击"开战"后塔自动攻击</p>
<p>💡 转弯处放塔效率最高！</p>
</div>
</div>

<div id="game" style="display:none">
<div id="top">
<span class="stat">💰<b id="show-gold">300</b></span>
<span class="stat">🌊<b id="show-wave">0</b></span>
<span class="stat">❤️<b id="show-hp">20</b></span>
</div>
<div id="canvas-box">
<canvas id="cv"></canvas>
<div id="entry-mark">🟢 入口 · 怪物从这里进入</div>
<div id="exit-mark">🔴 出口 · 到达这里扣血</div>
<div id="tip"></div>
<div id="wave-msg"></div>
<div id="info">
<h4>📊 路径分析</h4>
<p>长度: <b id="show-length">-</b> 格</p>
<p>转弯: <b id="show-turns">-</b> 处</p>
<p>效率: <b id="show-efficiency">-</b></p>
</div>
</div>
<div id="bottom">
<div id="current-tool">当前: <b id="tool-name">🏹弓箭塔</b> | 花费: <b id="tool-cost">80</b>金</div>
<div id="tower-panel">
<div class="tower-btn selected" data-type="archer" onclick="pickTower('archer')"><span class="icon">🏹</span><span class="price">80</span><span class="name">弓箭</span></div>
<div class="tower-btn" data-type="cannon" onclick="pickTower('cannon')"><span class="icon">💥</span><span class="price">120</span><span class="name">炮塔</span></div>
<div class="tower-btn" data-type="ice" onclick="pickTower('ice')"><span class="icon">❄️</span><span class="price">100</span><span class="name">冰冻</span></div>
<div class="tower-btn" data-type="thunder" onclick="pickTower('thunder')"><span class="icon">⚡</span><span class="price">150</span><span class="name">雷电</span></div>
<div class="tower-btn" data-type="poison" onclick="pickTower('poison')"><span class="icon">☠️</span><span class="price">90</span><span class="name">毒塔</span></div>
<div class="tower-btn" data-type="wall" onclick="pickTower('wall')"><span class="icon">🧱</span><span class="price">10</span><span class="name">墙壁</span></div>
</div>
<div id="toolbar">
<div class="tool-btn selected" id="tool-place" onclick="setTool('place')"><span class="icon">📍</span><span class="name">放置</span></div>
<div class="tool-btn" id="tool-delete" onclick="setTool('delete')"><span class="icon">🗑️</span><span class="name">删除</span></div>
</div>
<div id="actions">
<button class="act-btn" id="btn-fight" onclick="toggleBattle()">⚔️ 开战</button>
<button class="act-btn" id="btn-undo" onclick="undoLast()">↩️ 撤销</button>
<button class="act-btn" id="btn-clear" onclick="clearAll()">🗑️ 清空</button>
</div>
</div>
</div>

<div id="over">
<h1>💀 游戏结束</h1>
<p>坚持波次: <b id="final-wave">0</b></p>
<p>击杀怪物: <b id="final-kills">0</b></p>
<button class="menu-btn" onclick="startGame()" style="margin-top:28px">🔄 再来一局</button>
</div>

<script>
const CS=38,COLS=8,ROWS=12,ENTRY={x:1,y:0},EXIT={x:COLS-2,y:ROWS-1};
const TOWERS={
archer:{icon:'🏹',color:'#4CAF50',dmg:15,rng:3,spd:60,cost:80},
cannon:{icon:'💥',color:'#F44336',dmg:40,rng:2.5,spd:90,cost:120,aoe:1.2},
ice:{icon:'❄️',color:'#03A9F4',dmg:10,rng:2.5,spd:50,cost:100,slow:0.5},
thunder:{icon:'⚡',color:'#FFC107',dmg:20,rng:2.5,spd:40,cost:150,chain:3},
poison:{icon:'☠️',color:'#8BC34A',dmg:8,rng:2,spd:30,cost:90,dot:5},
wall:{icon:'🧱',color:'#78909C',dmg:0,rng:0,spd:0,cost:10}
};
const NAMES={archer:'🏹弓箭塔',cannon:'💥炮塔',ice:'❄️冰冻塔',thunder:'⚡雷电塔',poison:'☠️毒塔',wall:'🧱墙壁'};

let cv,ctx,W,H,ox,oy;
let grid,path,towers=[],enemies=[],bullets=[],parts=[],hist=[];
let gold=300,hp=20,wave=0,kills=0;
let curTower='archer',curTool='place',fighting=false;

function init(){cv=document.getElementById('cv');ctx=cv.getContext('2d');resize();cv.onclick=click;cv.ontouchend=touch;window.onresize=resize;}
function resize(){const b=document.getElementById('canvas-box');W=b.clientWidth;H=b.clientHeight;cv.width=W;cv.height=H;ox=Math.floor((W-COLS*CS)/2);oy=Math.floor((H-ROWS*CS)/2);}
function initGrid(){grid=[];for(let y=0;y<ROWS;y++){grid[y]=[];for(let x=0;x<COLS;x++){grid[y][x]=(x===0||x===COLS-1||y===0||y===ROWS-1)?1:0;}}grid[ENTRY.y][ENTRY.x]=0;grid[EXIT.y][EXIT.x]=0;towers=[];enemies=[];bullets=[];parts=[];hist=[];path=findPath();updateInfo();updateTool();}
function findPath(){const q=[[ENTRY.x,ENTRY.y,[]]],v={};v[ENTRY.x+','+ENTRY.y]=1;const d=[[0,1],[1,0],[0,-1],[-1,0]];while(q.length){const c=q.shift(),x=c[0],y=c[1],p=c[2];if(x===EXIT.x&&y===EXIT.y)return p.concat([[x,y]]);for(const[dx,dy]of d){const nx=x+dx,ny=y+dy,k=nx+','+ny;if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS&&grid[ny][nx]===0&&!v[k]){v[k]=1;q.push([nx,ny,p.concat([[x,y]])]);}}return null;}
function turns(p){if(!p||p.length<3)return 0;let t=0;for(let i=1;i<p.length-1;i++){if(p[i][0]-p[i-1][0]!==p[i+1][0]-p[i][0]||p[i][1]-p[i-1][1]!==p[i+1][1]-p[i][1])t++;}return t;}
function updateInfo(){document.getElementById('show-length').textContent=path?path.length:'断';document.getElementById('show-turns').textContent=turns(path);const e=document.getElementById('show-efficiency');if(!path){e.textContent='阻断!';e.className='bad';return;}const min=Math.abs(EXIT.x-ENTRY.x)+Math.abs(EXIT.y-ENTRY.y),r=path.length/min,b=1+turns(path)*0.15,s=Math.floor(r*b*100);if(s>=150){e.textContent='极佳 '+s+'%';e.className='good';}else if(s>=100){e.textContent='良好 '+s+'%';e.className='good';}else{e.textContent='较差 '+s+'%';e.className='bad';}}
function pickTower(t){curTower=t;curTool='place';document.querySelectorAll('.tower-btn').forEach(b=>b.classList.toggle('selected',b.dataset.type===t));document.querySelectorAll('.tool-btn').forEach(b=>b.classList.toggle('selected',b.id==='tool-place'));updateTool();const c=TOWERS[t].cost;if(gold<c)showTip('⚠️ 金币不足!');else showTip('✓ 已选择 '+NAMES[t]);}
function setTool(t){curTool=t;document.querySelectorAll('.tool-btn').forEach(b=>b.classList.toggle('selected',b.id==='tool-'+t));showTip(t==='delete'?'🗑️ 点击墙壁或塔删除':'📍 点击网格放置 '+NAMES[curTower]);updateTool();}
function updateTool(){const t=TOWERS[curTower];document.getElementById('tool-name').textContent=NAMES[curTower];document.getElementById('tool-cost').textContent=t.cost;document.querySelectorAll('.tower-btn').forEach(b=>{const c=parseInt(b.querySelector('.price').textContent);b.classList.toggle('disabled',gold<c);});}
function showTip(m){const t=document.getElementById('tip');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function click(e){if(fighting)return;const r=cv.getBoundingClientRect();act(e.clientX-r.left,e.clientY-r.top);}
function touch(e){if(fighting)return;e.preventDefault();const t=e.changedTouches[0],r=cv.getBoundingClientRect();act(t.clientX-r.left,t.clientY-r.top);}
function act(mx,my){const x=Math.floor((mx-ox)/CS),y=Math.floor((my-oy)/CS);if(x<=0||x>=COLS-1||y<=0||y>=ROWS-1){showTip('⚠️ 请点击网格内部!');return;}if((x===ENTRY.x&&y===ENTRY.y)||(x===EXIT.x&&y===EXIT.y)){showTip('⚠️ 不能放置在入口出口!');return;}if(curTool==='place')place(x,y);else deleteObj(x,y);}
function place(x,y){const t=TOWERS[curTower];if(grid[y][x]!==0){showTip('⚠️ 此位置已有物体!');return;}if(gold<t.cost){showTip('⚠️ 金币不足! 需要 '+t.cost+' 金');return;}hist.push({a:'p',x,y,tp:curTower});if(curTower==='wall'){grid[y][x]=1;gold-=t.cost;}else{grid[y][x]=2;gold-=t.cost;towers.push({x,y,tp:curTower,lv:1,icon:t.icon,color:t.color,dmg:t.dmg,rng:t.rng,spd:t.spd,aoe:t.aoe||0,slow:t.slow||0,chain:t.chain||0,dot:t.dot||0,cd:0});}const np=findPath();if(!np){grid[y][x]=0;gold+=t.cost;if(curTower!=='wall')towers.pop();hist.pop();showTip('⚠️ 不能阻断怪物路径!');path=findPath();}else{path=np;spawnP(ox+(x+0.5)*CS,oy+(y+0.5)*CS,t.color,12);showTip('✓ '+NAMES[curTower]+' 放置成功!');}updateUI();updateInfo();updateTool();render();}
function deleteObj(x,y){if(grid[y][x]===0){showTip('⚠️ 此位置没有物体!');return;}if(grid[y][x]===1){grid[y][x]=0;gold+=Math.floor(TOWERS.wall.cost*0.7);showTip('✓ 墙壁已删除');}else{for(let i=0;i<towers.length;i++)if(towers[i].x===x&&towers[i].y===y){gold+=Math.floor(TOWERS[towers[i].tp].cost*0.6);towers.splice(i,1);break;}grid[y][x]=0;showTip('✓ 防御塔已删除');}path=findPath();updateUI();updateInfo();updateTool();render();}
function undoLast(){if(!hist.length){showTip('没有可撤销的操作');return;}const h=hist.pop();if(h.a==='p'){if(h.tp==='wall'){grid[h.y][h.x]=0;gold+=TOWERS.wall.cost;}else{for(let i=0;i<towers.length;i++)if(towers[i].x===h.x&&towers[i].y===h.y){gold+=TOWERS[towers[i].tp].cost;towers.splice(i,1);break;}grid[h.y][h.x]=0;}}path=findPath();showTip('✓ 已撤销');updateUI();updateInfo();updateTool();render();}
function clearAll(){initGrid();gold=300;showTip('✓ 已清空所有建筑');updateUI();render();}
function toggleBattle(){if(!fighting){if(!path){showTip('⚠️ 请先建造有效迷宫!');return;}fighting=true;document.getElementById('btn-fight').textContent='⏸ 暂停';document.getElementById('entry-mark').style.display='none';document.getElementById('exit-mark').style.display='none';if(!enemies.length)spawnWave();loop();}else{fighting=false;document.getElementById('btn-fight').textContent='⚔️ 开战';}}
function spawnWave(){wave++;const boss=wave%10===0;showWave(boss?'👹 BOSS来袭!':'🌊 第'+wave+'波',boss?'#F44336':'#4CAF50');if(boss){enemies.push(makeE(2000+wave*200,'#AB47BC',1.0,500,true));}else{const cnt=Math.min(5+wave*2,30);for(let i=0;i<cnt;i++){let hp=50+wave*5,c='#8BC34A',sz=0.4,g=8;if(Math.random()<0.2&&wave>=3){hp=100;c='#42A5F5';sz=0.35;g=10;}if(Math.random()<0.1&&wave>=5){hp=250;c='#78909C';sz=0.5;g=25;}setTimeout(()=>{if(fighting&&path)enemies.push(makeE(hp,c,sz,g,false));},i*280);}}updateUI();}
function makeE(hp,co,sz,g,boss){return{x:ox+(path[0][0]+0.5)*CS,y:oy+(path[0][1]+0.5)*CS,hp:hp,mh:hp,spd:boss?0.35:1,co:co,sz:sz,g:g,sl:0,dt:0,dv:0,pi:0};}
function showWave(m,c){const e=document.getElementById('wave-msg');e.textContent=m;e.style.color=c;e.style.display='block';setTimeout(()=>e.style.display='none',1200);}
function loop(){if(!fighting)return;for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];let sp=e.spd;if(e.sl>0){sp*=0.5;e.sl--;}if(e.dt>0){e.hp-=e.dv;e.dt--;}e.pi+=sp/60;const idx=Math.min(Math.floor(e.pi),path.length-1);e.x=ox+(path[idx][0]+0.5)*CS;e.y=oy+(path[idx][1]+0.5)*CS;if(e.pi>=path.length-1){hp--;enemies.splice(i,1);updateUI();if(hp<=0){gameOver();return;}continue;}if(e.hp<=0){gold+=e.g;kills++;spawnP(e.x,e.y,e.co,18);enemies.splice(i,1);updateUI();updateTool();}}if(!enemies.length)setTimeout(()=>{if(fighting)spawnWave();},800);for(const t of towers){if(t.cd>0){t.cd--;continue;}const tx=ox+(t.x+0.5)*CS,ty=oy+(t.y+0.5)*CS,rn=t.rng*CS;let tg=null,md=Infinity;for(const e of enemies){const d=Math.hypot(e.x-tx,e.y-ty);if(d<rn&&d<md){md=d;tg=e;}}if(tg){t.cd=t.spd/60;const a=Math.atan2(tg.y-ty,tg.x-tx);bullets.push({x:tx,y:ty,vx:Math.cos(a)*12,vy:Math.sin(a)*12,d:t.dmg,co:t.color,src:t});}}for(let i=bullets.length-1;i>=0;i--){const b=bullets[i];b.x+=b.vx;b.y+=b.vy;if(b.x<0||b.x>W||b.y<0||b.y>H){bullets.splice(i,1);continue;}for(let j=enemies.length-1;j>=0;j--){const e=enemies[j];if(Math.hypot(e.x-b.x,e.y-b.y)<e.sz*CS*0.5+5){e.hp-=b.dmg;if(b.src.slow)e.sl=90;if(b.src.dot){e.dt=150;e.dv=b.src.dot;}if(b.src.aoe)for(const o of enemies)if(o!==e&&Math.hypot(o.x-b.x,o.y-b.y)<b.src.aoe*CS)o.hp-=b.dmg*0.35;if(b.src.chain){let cc=b.src.chain;for(const o of enemies)if(o!==e&&Math.hypot(o.x-e.x,o.y-e.y)<CS*2.5){o.hp-=b.dmg*0.5;cc--;if(cc<=0)break;}}spawnP(b.x,b.y,b.co,6);bullets.splice(i,1);break;}}}for(let i=parts.length-1;i>=0;i--){parts[i].x+=parts[i].vx;parts[i].y+=parts[i].vy;parts[i].vy+=0.15;parts[i].l--;if(parts[i].l<=0)parts.splice(i,1);}render();requestAnimationFrame(loop);}
function render(){ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){const px=ox+x*CS,py=oy+y*CS,v=grid[y][x];if(v===1){ctx.fillStyle='#2a2a5a';ctx.fillRect(px+2,py+2,CS-4,CS-4);}else{ctx.fillStyle='#0f0f2f';ctx.fillRect(px,py,CS,CS);}}const ex=ox+ENTRY.x*CS,ey=oy+ENTRY.y*CS;ctx.fillStyle='rgba(0,200,83,0.35)';ctx.fillRect(ex,ey,CS,CS);ctx.strokeStyle='#00C853';ctx.lineWidth=3;ctx.strokeRect(ex+3,ey+3,CS-6,CS-6);ctx.font=(CS*0.5)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('⬇️',ex+CS/2,ey+CS/2);const xx=ox+EXIT.x*CS,xy=oy+EXIT.y*CS;ctx.fillStyle='rgba(255,82,82,0.35)';ctx.fillRect(xx,xy,CS,CS);ctx.strokeStyle='#FF5252';ctx.strokeRect(xx+3,xy+3,CS-6,CS-6);ctx.fillText('⬆️',xx+CS/2,xy+CS/2);if(path&&!fighting){ctx.strokeStyle='rgba(255,215,0,0.3)';ctx.lineWidth=4;ctx.setLineDash([8,4]);ctx.beginPath();ctx.moveTo(ox+(path[0][0]+0.5)*CS,oy+(path[0][1]+0.5)*CS);for(let i=1;i<path.length;i++)ctx.lineTo(ox+(path[i][0]+0.5)*CS,oy+(path[i][1]+0.5)*CS);ctx.stroke();ctx.setLineDash([]);for(let i=1;i<path.length-1;i++){if(path[i][0]-path[i-1][0]!==path[i+1][0]-path[i][0]||path[i][1]-path[i-1][1]!==path[i+1][1]-path[i][1]){ctx.beginPath();ctx.arc(ox+(path[i][0]+0.5)*CS,oy+(path[i][1]+0.5)*CS,CS*0.25,0,Math.PI*2);ctx.strokeStyle='rgba(255,80,80,0.6)';ctx.lineWidth=2;ctx.stroke();}}}for(const t of towers){const tx=ox+(t.x+0.5)*CS,ty=oy+(t.y+0.5)*CS;ctx.beginPath();ctx.arc(tx,ty,CS*0.32,0,Math.PI*2);ctx.fillStyle=t.color+'66';ctx.fill();ctx.strokeStyle=t.color;ctx.lineWidth=2;ctx.stroke();ctx.font=(CS*0.35)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(t.icon,tx,ty);ctx.fillStyle='#fff';ctx.font='8px sans-serif';ctx.fillText('Lv'+t.lv,tx,ty+CS*0.22);}for(const e of enemies){const sz=e.sz*CS*0.42;ctx.beginPath();ctx.arc(e.x,e.y,sz,0,Math.PI*2);ctx.fillStyle=e.sl>0?'#00BFFF':e.co;ctx.fill();ctx.fillStyle='#333';ctx.fillRect(e.x-sz,e.y-sz-5,sz*2,4);const hr=Math.max(0,e.hp/e.mh);ctx.fillStyle=hr>0.5?'#4CAF50':hr>0.25?'#FFC107':'#F44336';ctx.fillRect(e.x-sz,e.y-sz-5,sz*2*hr,4);}for(const b of bullets){ctx.beginPath();ctx.arc(b.x,b.y,5,0,Math.PI*2);ctx.fillStyle=b.co;ctx.fill();}for(const p of parts){ctx.globalAlpha=p.l/p.ml;ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fillStyle=p.co;ctx.fill();}ctx.globalAlpha=1;}
function spawnP(x,y,c,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*5;parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,co:c,l:30,ml:30});}}
function updateUI(){document.getElementById('show-gold').textContent=gold;document.getElementById('show-wave').textContent=wave;document.getElementById('show-hp').textContent=hp;}
function startGame(){document.getElementById('menu').style.display='none';document.getElementById('game').style.display='flex';document.getElementById('over').style.display='none';init();initGrid();gold=300;hp=20;wave=0;kills=0;fighting=false;updateUI();render();}
function gameOver(){fighting=false;document.getElementById('final-wave').textContent=wave;document.getElementById('final-kills').textContent=kills;document.getElementById('over').style.display='flex';}
init();
</script>
</body>
